name: deploy-dashboard

on:
  push:
    branches: [main]
    paths: ['dashboard/**', '.github/workflows/deploy-dashboard.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Inject Supabase URL + anon key + (optional) dashboard secret into config.js
      # using GitHub Actions Variables (vars) and Secrets. The anon key is safe
      # in client-side code when RLS is enabled.
      - name: Write dashboard config.js
        env:
          SUPABASE_URL:      ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          DASHBOARD_SECRET:  ${{ secrets.DASHBOARD_SECRET }}
        run: |
          cat > dashboard/config.js <<EOF
          window.__CJW_CONFIG__ = {
            SUPABASE_URL: "${SUPABASE_URL}",
            SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}",
            DASHBOARD_SECRET: "${DASHBOARD_SECRET}",
          };
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard

      - id: deployment
        uses: actions/deploy-pages@v4
